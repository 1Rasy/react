<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>员工管理 Mock 视觉验证</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
</head>
<body>
  <div id="root"></div>
  <script type="module">
    const entryHtml = await fetch('/employees.html').then(response => response.text());
    const styleText = entryHtml.match(/<style>([\s\S]*?)<\/style>/)?.[1] || '';
    const style = document.createElement('style');
    style.textContent = styleText;
    document.head.append(style);

    const employees = [
      { id: 1, employee_code: 'E2', name: '李四', is_active: false, created_at: '2026-07-01T00:00:00Z' },
      { id: 2, employee_code: 'E10', name: '张三', is_active: true, created_at: '2026-07-02T00:00:00Z' },
      { id: 3, employee_code: 'S260401018', name: '王五', is_active: true, created_at: '2026-07-03T00:00:00Z' },
      { id: 4, employee_code: 'S260401020', name: '赵六', is_active: true, created_at: '2026-07-04T00:00:00Z' }
    ];
    const mappings = [
      { id: 1, customer_code: 'C002', customer_name: '二号门店', employee_code: 'E2' },
      { id: 2, customer_code: 'C010', customer_name: '十号门店', employee_code: 'E10' },
      { id: 3, customer_code: 'C018', customer_name: '十八号门店', employee_code: 'S260401018' }
    ];
    const nativeFetch = window.fetch.bind(window);
    window.__consoleErrors = [];
    const nativeConsoleError = console.error.bind(console);
    console.error = (...args) => {
      window.__consoleErrors.push(args.map(value => String(value)).join(' '));
      nativeConsoleError(...args);
    };
    window.fetch = async (input, init) => {
      const url = new URL(typeof input === 'string' ? input : input.url, location.href);
      if (!url.hostname.endsWith('.supabase.co')) return nativeFetch(input, init);
      const method = String(init?.method || (typeof input === 'string' ? 'GET' : input.method) || 'GET').toUpperCase();
      if (method !== 'GET') {
        return new Response(JSON.stringify({ message: 'Visual fixture blocks writes' }), {
          status: 405,
          headers: { 'content-type': 'application/json' }
        });
      }
      const data = url.pathname.endsWith('/employees') ? employees : mappings;
      return new Response(JSON.stringify(data), {
        status: 200,
        headers: { 'content-type': 'application/json', 'content-range': `0-${data.length - 1}/${data.length}` }
      });
    };
    await import('/src/employees/main.tsx');
  </script>
</body>
</html>
