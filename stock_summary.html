<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>库存管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root{--primary:#4A154B;--bg:#f4f2f5;--card:#fff;--text:#1f1121;--muted:#756676;--line:#e7e1e8;--danger:#dc2626;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;padding:12px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-tap-highlight-color:transparent}.shell{max-width:1280px;margin:0 auto}.card{margin-bottom:12px;padding:14px;border-radius:14px;background:var(--card);box-shadow:0 4px 14px rgba(74,21,75,.06)}.top{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}h1{margin:0;color:var(--primary);font-size:22px}h2{margin:0 0 10px;color:var(--primary);font-size:17px}.sub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.55}.btn{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--text);font-weight:700;cursor:pointer}.btn.primary{border-color:var(--primary);background:var(--primary);color:#fff}.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}.input{min-width:220px;padding:10px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:14px}.status{margin-top:8px;color:var(--muted);font-size:13px;white-space:pre-line;line-height:1.5}.status.hide{display:none}.error{color:var(--danger);font-weight:700}.metric-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.metric{min-height:82px;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fbf9fc}.metric .label{color:var(--muted);font-size:12px}.metric .value{margin-top:8px;color:var(--primary);font-size:23px;font-weight:800}.metric .hint{margin-top:6px;color:var(--muted);font-size:12px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}table{width:100%;min-width:820px;border-collapse:separate;border-spacing:0}th,td{padding:8px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:middle;font-size:13px;white-space:normal;word-break:break-word}th{position:sticky;top:0;z-index:1;background:#fbf9fc;color:var(--primary);text-align:left;font-weight:800}tr.clickable{cursor:pointer}tr.clickable:hover{background:#fbf9fc}.amount{color:var(--primary);font-weight:800}.empty{padding:18px;color:var(--muted);text-align:center}.pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:#f4f2f5;color:var(--primary);font-size:12px;font-weight:700}.pill.warn{background:#fffbeb;color:#92400e}.detail-row td{padding:0;background:#fffdf7}.detail-box{padding:12px}.detail-title{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}.detail-table{min-width:1040px;table-layout:fixed}.detail-table th,.detail-table td{padding:9px 10px;vertical-align:top;line-height:1.45}.detail-table th:nth-child(1),.detail-table td:nth-child(1){width:390px}.detail-table th:nth-child(2),.detail-table td:nth-child(2){width:145px;white-space:nowrap}.detail-table th:nth-child(3),.detail-table td:nth-child(3){width:110px;text-align:right;white-space:nowrap}.detail-table th:nth-child(4),.detail-table td:nth-child(4){width:150px;white-space:nowrap}.detail-table th:nth-child(5),.detail-table td:nth-child(5),.detail-table th:nth-child(6),.detail-table td:nth-child(6){width:90px;text-align:right;white-space:nowrap}.detail-table th:nth-child(7),.detail-table td:nth-child(7){width:140px;white-space:nowrap}.detail-product{display:block;font-weight:800;line-height:1.45}.qty-zero{color:#aaa}.qty-negative{color:var(--danger);font-weight:800}.inventory-tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.inventory-tool-link{display:flex;align-items:center;justify-content:space-between;gap:18px;min-width:190px;padding:8px 10px 8px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--primary);text-decoration:none;font-weight:800;transition:background .15s,border-color .15s}.inventory-tool-link:hover{border-color:var(--primary);background:#fbf9fc}.inventory-tool-link span{display:flex;align-items:center;justify-content:center;flex:0 0 22px;width:22px;height:22px;padding-bottom:1px;border-radius:50%;background:var(--primary);color:#fff;font-family:Arial,sans-serif;font-size:14px;line-height:1}@media(max-width:650px){body{padding:8px}.metric-grid{grid-template-columns:1fr}.inventory-tool-link{width:100%}.filters .btn,.input{width:100%;min-width:0}}
.inventory-tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.inventory-tool-link{display:inline-flex;align-items:center;justify-content:center;min-width:0;padding:9px 12px;color:var(--text);text-decoration:none;line-height:1.2}.inventory-tool-link:hover{border-color:var(--primary);background:#fbf9fc}.inventory-tool-link span{display:none}@media(max-width:650px){.inventory-tool-link{width:auto}}
</style>
</head>
<body>
<div class="shell">
  <div class="card">
    <div class="top">
      <div>
        <h1>库存管理</h1>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="location.href='dashboard.html'">返回管理看板</button>
        <button class="btn" onclick="openImportFile()">导入7月1日期初库存</button>
        <button class="btn" onclick="exportEmployeeStocks()">导出</button>
        <button class="btn primary" onclick="loadAll()">刷新</button>
        <input id="stockImportFile" type="file" accept=".xlsx,.xls" style="display:none" onchange="importStockExcel(event)">
      </div>
    </div>
    <div class="filters">
      <input id="searchInput" class="input" placeholder="搜索员工/工号/商品/条码" oninput="renderAll()">
      <button class="btn" onclick="clearSearch()">清空搜索</button>
    </div>
    <div class="inventory-tools" aria-label="库存管理工具">
      <a class="btn inventory-tool-link" href="stock-adjustment-review">库存修改审核</a>
      <a class="btn inventory-tool-link" href="inventory-movements">库存流水</a>
    </div>
  </div>
  <div id="status" class="status">正在加载库存...</div>
  <div class="metric-grid" id="metricGrid"></div>
  <div class="card">
    <h2>员工库存汇总</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th style="width:60px">展开</th><th>员工</th><th style="width:110px">库存品项</th><th style="width:120px">库存合计</th><th style="width:120px">负数品项</th><th style="width:160px">最近更新时间</th></tr></thead>
        <tbody id="employeeRows"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL='https://wyjbnnqhiehjccmojbbg.supabase.co';
const SUPABASE_KEY='sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG';
const INVENTORY_BASELINE_ID='2026-07-01-opening';
const INVENTORY_CUTOFF='2026-07-01T00:00:00+08:00';
const PAGE_SIZE=1000;
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let employees=[],products=[],stocks=[],employeeMap=new Map(),productMap=new Map(),expandedEmployee='';

function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function num(v){return Number(v||0);}
function qty(v){return num(v).toLocaleString('zh-CN',{maximumFractionDigits:0});}
function formatDate(value){if(!value)return'-';const d=new Date(value);if(Number.isNaN(d.getTime()))return String(value).slice(0,16);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function setStatus(msg,cls=''){const el=document.getElementById('status');el.className='status '+cls;el.textContent=msg;}
function hideStatus(){const el=document.getElementById('status');el.className='status hide';el.textContent='';}
function productSortValue(p){const s=Number(p.sort_order);if(Number.isFinite(s)&&s>0)return s;const i=Number(p.id||0);return Number.isFinite(i)&&i>0?i*10:999999;}
function productDisplayName(product,fallback=''){const label=[product?.spec,product?.flavor].map(v=>String(v??'').trim()).filter(Boolean).join(' ');return label||String(fallback||product?.barcode||product?.id||'').trim();}
function compareProducts(a,b){const d=productSortValue(a)-productSortValue(b);if(d!==0)return d;return productDisplayName(a,a.barcode).localeCompare(productDisplayName(b,b.barcode),'zh-CN',{numeric:true});}
function productDisplay(barcode){const p=productMap.get(String(barcode||''));if(!p)return{title:String(barcode||'未知条码'),pcs_per_case:0,pcs_per_box:0,unit:'个',sort_order:999999};return{title:productDisplayName(p,barcode),pcs_per_case:num(p.pcs_per_case),pcs_per_box:num(p.pcs_per_box),unit:p.unit||'个',sort_order:num(p.sort_order)||productSortValue(p),id:p.id||0};}
function formatStockUnits(totalPcs,product){const pcs=num(totalPcs),specCase=num(product.pcs_per_case)||0,specBox=num(product.pcs_per_box)||0,unit=product.unit||'个';if(specCase<=0)return`${qty(pcs)}${unit}`;const sign=pcs<0?'-':'';let rest=Math.abs(pcs);const cases=Math.floor(rest/specCase);rest%=specCase;if(specBox>0){const boxes=Math.floor(rest/specBox),loose=rest%specBox;return`${sign}${cases}件 ${boxes}盒 ${loose}${unit}`;}return`${sign}${cases}件 ${rest}${unit}`;}
function clearSearch(){document.getElementById('searchInput').value='';renderAll();}
function toggleExpand(code){expandedEmployee=expandedEmployee===code?'':code;renderAll();}

async function fetchAllRows(table,columns,orders=[]){
  const all=[];
  for(let from=0;from<100000;from+=PAGE_SIZE){
    let query=client.from(table).select(columns);
    orders.forEach(order=>{query=query.order(order.column,{ascending:order.ascending!==false,nullsFirst:false});});
    const {data,error}=await query.range(from,from+PAGE_SIZE-1);
    if(error)throw error;
    const page=data||[];
    all.push(...page);
    if(page.length<PAGE_SIZE)return all;
  }
  throw new Error(`${table} 数据超过安全读取上限`);
}

function buildRows(){
  const search=String(document.getElementById('searchInput').value||'').trim().toLowerCase();
  const grouped=new Map();
  stocks.forEach(st=>{
    const code=String(st.employee_code||''),barcode=String(st.product_barcode||''),amount=num(st.qty);
    const emp=employeeMap.get(code)||{employee_code:code,name:''};
    const prod=productDisplay(barcode);
    const haystack=[code,emp.name,barcode,prod.title].join(' ').toLowerCase();
    if(search&&!haystack.includes(search))return;
    if(!grouped.has(code))grouped.set(code,{employee_code:code,name:emp.name||'',is_active:emp.is_active!==false,itemCount:0,negativeCount:0,totalQty:0,lastUpdated:'',items:[]});
    const row=grouped.get(code);row.itemCount+=1;row.totalQty+=amount;if(amount<0)row.negativeCount+=1;if(!row.lastUpdated||String(st.updated_at||'')>String(row.lastUpdated))row.lastUpdated=st.updated_at||'';row.items.push({...st,product:prod,qty:amount});
  });
  return Array.from(grouped.values()).map(row=>{row.items.sort((a,b)=>a.product.sort_order-b.product.sort_order||String(a.product_barcode).localeCompare(String(b.product_barcode),'zh-CN',{numeric:true}));return row;}).sort((a,b)=>a.totalQty-b.totalQty||b.itemCount-a.itemCount||String(a.employee_code).localeCompare(String(b.employee_code),'zh-CN',{numeric:true}));
}

function renderMetrics(rows){
  const totalEmployees=new Set(stocks.map(st=>String(st.employee_code||'')).filter(Boolean)).size;
  const totalQty=stocks.reduce((sum,st)=>sum+num(st.qty),0);
  document.getElementById('metricGrid').innerHTML=`<div class="metric"><div class="label">参与库存员工</div><div class="value">${totalEmployees}</div></div><div class="metric"><div class="label">库存记录总数</div><div class="value">${stocks.length.toLocaleString('zh-CN')}</div></div><div class="metric"><div class="label">当前库存合计</div><div class="value">${qty(totalQty)}</div></div>`;
}

function renderEmployeeRows(rows){
  const tbody=document.getElementById('employeeRows');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="6"><div class="empty">暂无库存数据</div></td></tr>';return;}
  tbody.innerHTML=rows.map(row=>{const open=expandedEmployee===row.employee_code;return`<tr class="clickable" onclick="toggleExpand('${esc(row.employee_code)}')"><td><span class="pill">${open?'收起':'展开'}</span></td><td><strong>${esc(row.name||row.employee_code)}</strong>${row.is_active?'':'<div class="sub">已停用</div>'}</td><td class="amount">${row.itemCount}</td><td class="amount">${qty(row.totalQty)}</td><td>${row.negativeCount?`<span class="pill warn">${row.negativeCount}</span>`:'0'}</td><td>${esc(formatDate(row.lastUpdated))}</td></tr>${open?renderDetailRow(row):''}`;}).join('');
}

function renderDetailRow(row){return`<tr class="detail-row"><td colspan="6"><div class="detail-box"><div class="detail-title"><strong>${esc(row.name||row.employee_code)} 的库存明细</strong><span class="sub">共 ${row.items.length} 个条码</span></div><div class="table-wrap"><table class="detail-table"><thead><tr><th>规格口味</th><th>条码</th><th>库存散数</th><th>换算显示</th><th>箱规</th><th>盒规</th><th>更新时间</th></tr></thead><tbody>${row.items.map(item=>{const cls=item.qty<0?'qty-negative':item.qty===0?'qty-zero':'amount';return`<tr><td><span class="detail-product">${esc(item.product.title)}</span></td><td>${esc(item.product_barcode)}</td><td class="${cls}">${qty(item.qty)}</td><td>${esc(formatStockUnits(item.qty,item.product))}</td><td>${item.product.pcs_per_case||'-'}</td><td>${item.product.pcs_per_box||'-'}</td><td>${esc(formatDate(item.updated_at))}</td></tr>`;}).join('')}</tbody></table></div></div></td></tr>`;}

function exportEmployeeStocks(){if(!window.XLSX){alert('Excel 导出组件加载失败，请刷新页面后重试');return;}const rows=buildRows(),data=[['员工名字','员工号','规格口味','条码','库存散数']];rows.forEach(row=>row.items.forEach(item=>data.push([row.name||'',row.employee_code,item.product.title,String(item.product_barcode||''),item.qty])));const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:14},{wch:14},{wch:38},{wch:18},{wch:12}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'库存管理');XLSX.writeFile(wb,`库存管理_${new Date().toISOString().slice(0,10)}.xlsx`);}
function openImportFile(){const input=document.getElementById('stockImportFile');if(input){input.value='';input.click();}}
function normalizeImportText(v){return String(v??'').replace(/\u00a0/g,' ').trim();}
function normalizeImportCode(v){const text=normalizeImportText(v);return /^\d+\.0$/.test(text)?text.replace(/\.0$/,''):text;}
function parseImportQty(v){const text=normalizeImportText(v).replace(/,/g,'');if(text==='')return NaN;return Number(text);}
function splitChunks(arr,size=500){const chunks=[];for(let i=0;i<arr.length;i+=size)chunks.push(arr.slice(i,i+size));return chunks;}
async function fetchExistingValues(table,column,values){const result=new Set(),list=Array.from(new Set(values.map(v=>String(v||'')).filter(Boolean)));for(const part of splitChunks(list,500)){const {data,error}=await client.from(table).select(column).in(column,part);if(error)throw error;(data||[]).forEach(row=>result.add(String(row[column]||'')));}return result;}
function parseStockImportRows(ws){const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''}),parsed=[],errors=[];rows.forEach((row,idx)=>{const line=idx+1,employeeCode=normalizeImportCode(row[0]),barcode=normalizeImportCode(row[1]),qtyValue=parseImportQty(row[2]),isBlank=!employeeCode&&!barcode&&!normalizeImportText(row[2]);if(isBlank)return;const looksLikeHeader=line===1&&/员工|employee/i.test(employeeCode)&&/条码|barcode/i.test(barcode);if(looksLikeHeader)return;if(!employeeCode||!barcode||!Number.isFinite(qtyValue)||!Number.isInteger(qtyValue)){errors.push(`第 ${line} 行格式错误：A列员工编号、B列条码、C列整数散数都不能为空`);return;}parsed.push({line,employee_code:employeeCode,product_barcode:barcode,qty:qtyValue});});return{parsed,errors};}

async function importStockExcel(event){
  const input=event?.target,file=input?.files?.[0];if(!file)return;if(!window.XLSX){alert('Excel 组件加载失败，请刷新页面后重试');return;}
  try{
    setStatus('正在读取 Excel...');
    const wb=XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:false}),ws=wb.Sheets[wb.SheetNames[0]];
    if(!ws)throw new Error('Excel 中没有可读取的工作表');
    const {parsed,errors}=parseStockImportRows(ws);
    if(errors.length){alert(`导入失败，共 ${errors.length} 行格式错误。\n\n`+errors.slice(0,12).join('\n'));setStatus('导入已取消：Excel 格式有错误','error');return;}
    if(!parsed.length)throw new Error('没有读取到库存数据。请确认 A列员工编号、B列条码、C列散数。');
    setStatus(`正在校验 ${parsed.length} 行库存...`);
    const employeeCodes=parsed.map(r=>r.employee_code),barcodes=parsed.map(r=>r.product_barcode);
    const [validEmployees,validProducts]=await Promise.all([fetchExistingValues('employees','employee_code',employeeCodes),fetchExistingValues('products','barcode',barcodes)]);
    const missingEmployees=Array.from(new Set(employeeCodes.filter(code=>!validEmployees.has(String(code))))),missingProducts=Array.from(new Set(barcodes.filter(code=>!validProducts.has(String(code)))));
    if(missingEmployees.length||missingProducts.length){const parts=[];if(missingEmployees.length)parts.push(`员工编号不存在：${missingEmployees.slice(0,20).join('、')}${missingEmployees.length>20?' 等':''}`);if(missingProducts.length)parts.push(`商品条码不存在：${missingProducts.slice(0,20).join('、')}${missingProducts.length>20?' 等':''}`);throw new Error(parts.join('\n'));}
    const merged=new Map();let duplicateCount=0;parsed.forEach(row=>{const key=row.employee_code+'|'+row.product_barcode;if(merged.has(key))duplicateCount+=1;merged.set(key,{employee_code:row.employee_code,product_barcode:row.product_barcode,qty:row.qty});});
    const rowsToSave=Array.from(merged.values()),affectedEmployees=new Set(rowsToSave.map(r=>r.employee_code)).size,includesS=rowsToSave.some(r=>String(r.employee_code).toLowerCase()==='s260401018');
    const specialNote=includesS?'\n\n文件包含 S260401018：他的原68条保留库存会由本文件中的期初库存替换。':'\n\n文件未包含 S260401018：他的原68条保留库存保持不变。';
    if(!confirm(`将导入 ${rowsToSave.length} 条 2026-07-01 期初库存，涉及 ${affectedEmployees} 名员工。\n\n系统会替换这些员工的期初库存，并自动减去 2026-07-01 及之后的全部订单销量。${specialNote}\n\n确认继续吗？`)){setStatus('已取消导入');return;}
    setStatus('正在保存期初库存并按7月1日后全部订单重算...');
    const {data,error}=await client.rpc('import_van_stock_baseline',{p_baseline_id:INVENTORY_BASELINE_ID,p_rows:rowsToSave,p_cutoff:INVENTORY_CUTOFF});
    if(error)throw error;
    await loadAll();
    const result=data||{},negativeCount=rowsToSave.filter(r=>r.qty<0).length;
    setStatus(`导入完成：期初库存 ${result.imported_baseline_rows??rowsToSave.length} 条，重算库存 ${result.written_stock_rows??'-'} 条，页面已读取 ${stocks.length} 条完整库存，涉及 ${result.employees??affectedEmployees} 名员工${negativeCount?`，负数期初库存 ${negativeCount} 条`:''}${duplicateCount?`，重复行按最后一行覆盖 ${duplicateCount} 条`:''}。`);
  }catch(err){console.error(err);setStatus('库存导入失败：'+(err?.message||err),'error');alert('库存导入失败：'+(err?.message||err));}
  finally{if(input)input.value='';}
}

function renderAll(){const rows=buildRows();renderMetrics(rows);renderEmployeeRows(rows);hideStatus();}
async function loadAll(){
  setStatus('正在分页加载全部库存...');
  try{
    const [stockRows,employeeRows,productRows]=await Promise.all([
      fetchAllRows('van_stocks','employee_code, product_barcode, qty, updated_at',[{column:'employee_code'},{column:'product_barcode'}]),
      fetchAllRows('employees','employee_code, name, is_active',[{column:'employee_code'}]),
      fetchAllRows('products','id, sort_order, barcode, brand, spec, flavor, pcs_per_case, pcs_per_box, unit, is_active',[{column:'sort_order'},{column:'id'}])
    ]);
    stocks=stockRows;employees=employeeRows;products=productRows.sort(compareProducts);employeeMap=new Map(employees.map(emp=>[String(emp.employee_code||''),emp]));productMap=new Map(products.map(p=>[String(p.barcode||''),p]));renderAll();
  }catch(err){console.error(err);setStatus('库存加载失败：'+(err?.message||err),'error');}
}
loadAll();
</script>
</body>
</html>
