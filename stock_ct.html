<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>长涛库存导入</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root{--primary:#4A154B;--bg:#f4f2f5;--card:#fff;--text:#1f1121;--muted:#756676;--line:#e7e1e8;--danger:#dc2626}*{box-sizing:border-box}body{margin:0;padding:12px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}.container{max-width:760px;margin:0 auto}.card{background:var(--card);border:0;border-radius:14px;padding:14px;box-shadow:0 4px 14px rgba(74,21,75,.06);margin-bottom:12px}h2{margin:0 0 10px;font-size:22px;color:var(--primary)}.back{display:inline-block;margin:0 0 12px;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:9px;padding:9px 12px;font-size:14px;font-weight:700;text-decoration:none}.map{border:1px solid var(--line);border-radius:10px;background:#fbf9fc;padding:12px;font-size:13px;line-height:1.6;color:var(--text);margin:0 0 12px}.upload{border:1px dashed var(--line);background:#fff;padding:45px 20px;border-radius:12px;cursor:pointer;text-align:center;position:relative;color:var(--muted)}.upload:hover,.upload.dragover{border-color:var(--primary);background:#fbf9fc}.file{position:absolute;inset:0;opacity:0;cursor:pointer}.info{margin-top:14px;padding:12px;background:#e8f5e9;border:1px solid #c8e6c9;border-radius:9px;font-size:14px;color:#2e7d32;display:none}.btn{margin-top:14px;width:100%;background:var(--primary);color:#fff;border:1px solid var(--primary);padding:13px;border-radius:9px;font-size:15px;font-weight:700}.btn:disabled{background:#ced4da;border-color:#ced4da}.status{margin-top:15px;font-size:13px;font-weight:700;color:var(--primary);text-align:center;white-space:pre-line}.error{color:var(--danger)}.hide{display:none!important}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module" src="/src/stock-ct/main.tsx"></script>
</body>
</html>
