<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>管理后台</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root{--primary:#4A154B;--primary2:#6A266C;--bg:#f4f2f5;--text:#1f1121;--muted:#756676;--line:#e7e1e8;--soft:#fbf9fc;--danger:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 0 0,#eadfef 0,#f4f2f5 35%,#f4f2f5 100%);color:var(--text);padding:18px;-webkit-tap-highlight-color:transparent}.shell{max-width:1220px;margin:0 auto}.hero{border-radius:28px;padding:26px 30px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 16px 36px rgba(74,21,75,.22);margin-bottom:14px}.hero-main{display:flex;justify-content:space-between;gap:18px;align-items:center;flex-wrap:wrap}h1{margin:0;font-size:34px}.hero-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;font-size:14px;min-height:40px}.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}.hero-btn{color:var(--primary)}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid rgba(231,225,232,.85);box-shadow:0 10px 24px rgba(74,21,75,.07);margin-bottom:14px}.quick-panel{padding:16px}.nav-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}.nav-card{border:1px solid var(--line);background:var(--soft);border-radius:18px;padding:14px;min-height:78px;cursor:pointer;text-align:left;display:flex;gap:12px;align-items:center}.nav-ico{width:42px;height:42px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}.nav-card strong{display:block;color:var(--text);font-size:15px}.nav-arrow{margin-left:auto;color:var(--primary);font-weight:950;font-size:20px}.filter-panel{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.range-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.range-btn{border:1px solid var(--line);background:#fff;color:var(--primary);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:900;cursor:pointer}.range-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}.date-input{height:38px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:0 12px;color:var(--primary);font-weight:800}.date-range-picker{position:relative}.date-range-input{width:238px;cursor:pointer}.date-range-panel{position:absolute;top:46px;right:0;z-index:30;width:520px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 34px rgba(31,17,33,.16);padding:12px}.date-range-panel.hide{display:none}.range-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;color:var(--primary);font-size:13px;font-weight:950}.range-cal-head button{border:0;background:#f4f2f5;color:var(--primary);border-radius:999px;width:30px;height:30px;font-weight:950;cursor:pointer}.range-cal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.range-month-title{text-align:center;color:var(--primary);font-weight:950;font-size:13px;margin-bottom:8px}.range-week,.range-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.range-week span{font-size:11px;color:var(--muted);text-align:center}.range-day{height:28px;border:0;border-radius:7px;background:#fff;color:var(--text);font-weight:800;cursor:pointer}.range-day.muted{color:#c8c0ca}.range-day.in-range{background:#f1e9f3}.range-day.active{background:var(--primary);color:#fff}.range-picker-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}.range-picker-actions button{border:1px solid var(--line);background:#fff;color:var(--primary);border-radius:999px;padding:7px 12px;font-weight:900;cursor:pointer}.employee-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.employee-chip{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer}.employee-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}.status{font-size:13px;color:var(--muted);margin:4px 0 12px}.status.hide{display:none}.error{color:var(--danger);font-weight:800}.metric-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:14px}.metric{background:#fff;border-radius:20px;padding:18px;border:1px solid rgba(231,225,232,.8);box-shadow:0 10px 24px rgba(74,21,75,.07);min-height:106px}.metric-icon{width:44px;height:44px;border-radius:15px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px}.metric-label{font-size:12px;color:var(--muted);font-weight:800}.metric-value{margin-top:12px;color:var(--primary);font-size:30px;font-weight:950}.content-grid{display:grid;grid-template-columns:420px minmax(0,1fr);gap:14px}.panel-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.panel-title h2{margin:0;color:var(--primary);font-size:20px}.chart-wrap{height:220px;background:linear-gradient(180deg,#fff,#fbf9fc);border:1px solid var(--line);border-radius:18px;padding:12px 14px;overflow:hidden}.trend-figure{height:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:6px}.trend-line-svg{width:100%;height:176px;display:block}.trend-axis{display:grid;grid-template-columns:repeat(var(--trend-count),minmax(0,1fr));gap:4px;font-size:10px;color:var(--muted);padding:0 8px}.trend-axis span{text-align:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:clip}.empty{padding:28px;color:var(--muted);text-align:center;font-size:13px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}table{width:100%;min-width:650px;border-collapse:separate;border-spacing:0}th,td{border-bottom:1px solid var(--line);padding:11px 10px;vertical-align:middle;font-size:13px;white-space:normal;word-break:break-word}th{position:sticky;top:0;background:var(--primary);color:#fff;text-align:left;font-weight:900;z-index:2}tbody tr:nth-child(even){background:#fbf9fc}.rank{display:inline-flex;width:26px;height:26px;align-items:center;justify-content:center;border-radius:999px;background:#f4f2f5;color:var(--primary);font-weight:950}.amount{font-weight:950;color:var(--primary)}.emp-code{margin-top:3px;color:var(--muted);font-size:12px}@media(max-width:1000px){.nav-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.content-grid{grid-template-columns:1fr}}@media(max-width:640px){body{padding:10px}.hero{padding:22px 18px;border-radius:22px}h1{font-size:28px}.hero-actions{width:100%}.metric-grid{grid-template-columns:1fr}.nav-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.filter-panel{display:block}.range-row{margin-bottom:10px}.range-btn,.date-input{flex:1 1 auto}.panel{padding:14px;border-radius:18px}.employee-filter{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}.employee-chip{width:100%}}
.inventory-management-card{position:relative}.notification-badge{position:absolute;top:-7px;right:-7px;display:none;min-width:21px;height:21px;padding:0 6px;border-radius:999px;background:#dc2626;color:#fff;font-size:12px;font-weight:900;line-height:21px;text-align:center;box-shadow:0 0 0 2px #fff}.notification-badge.visible{display:block}
</style>
<style>.trend-axis{display:flex;justify-content:space-between;gap:8px;font-size:10px;color:var(--muted);padding:0 8px}.trend-axis span{flex:0 0 auto;text-align:center;white-space:nowrap}</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script type="module" src="/src/dashboard/main.tsx"></script>
</body>
</html>
